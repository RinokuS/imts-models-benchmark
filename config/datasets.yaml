physionet_p12:
  name: PhysioNet Challenge 2012
  n_channels: 36
  n_classes: 2
  task: mortality
  split: [0.8, 0.1, 0.1]
  stratify: true
  max_seq_len: 215       # 95th percentile of observation counts
  missing_frac: 0.80     # approximate
  normalize: zscore      # fit on train, apply to observed values only
  data_dir: data/raw/physionet2012

physionet_p19:
  name: PhysioNet Challenge 2019
  n_channels: 34
  n_classes: 2
  task: sepsis
  split: [0.7, 0.15, 0.15]
  stratify: true
  max_seq_len: 336       # 95th percentile
  missing_frac: 0.70
  normalize: zscore
  time_scale: 48.0       # divide timestamps by 48h to map to [0,1]
  data_dir: data/raw/physionet2019

synthetic:
  name: Synthetic IMTS
  n_channels: 10
  n_classes: 2
  task: classification
  n_samples: 5000
  split: [0.7, 0.15, 0.15]
  stratify: true
  seq_len: 500           # default; overridden in stress tests
  missing_frac: 0.40     # default MCAR rate
  noise_std: 0.1
  seed: 0
